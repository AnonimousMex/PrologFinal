<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Back To The Sample | Genealogía Musical</title>
        <style>
        /* Diseño general más premium */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle at 50% 0%, #1a1a2e, #121212);
            color: #e0e0e0; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; min-height: 100vh; margin: 0;
        }
        
        h1 { color: #1DB954; font-size: 2.5rem; letter-spacing: 1px; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(29,185,84,0.3); }
        .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 30px; font-weight: 300; }

        .search-box { 
            margin-bottom: 40px; display: flex; gap: 15px; 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        
        input { 
            padding: 12px 20px; font-size: 16px; border-radius: 30px; 
            border: none; width: 350px; background: rgba(0,0,0,0.3); color: white; outline: none;
        }
        input:focus { border: 1px solid #1DB954; }
        
        button { 
            padding: 12px 25px; font-size: 16px; border-radius: 30px; border: none; 
            background: linear-gradient(135deg, #1DB954, #1ed760); color: white; 
            cursor: pointer; font-weight: bold; transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(29,185,84,0.4); }

        .tree-container { 
            background-color: rgba(30,30,30,0.7); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 15px; width: 100%; max-width: 550px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05);
        }

        .arrow { text-align: center; color: #1DB954; font-size: 24px; margin: 15px 0; opacity: 0.8; }

        /* Tarjeta de la canción original (Cuadrada, tipo Álbum CD) */
        .spotify-card { 
            display: flex; align-items: center; gap: 20px; 
            padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .spotify-img { 
            width: 100px; height: 100px; border-radius: 10px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.6); object-fit: cover; 
        }
        .spotify-title { margin: 0; color: #fff; font-size: 24px; font-weight: bold; }
        .spotify-artist { margin: 5px 0 0 0; color: #1DB954; font-weight: 500; font-size: 15px; }

        /* Diseño de Vinilo para los Ancestros */
        .vinyl-node {
            display: flex; align-items: center; gap: 20px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            padding: 15px 20px; border-radius: 12px; margin-bottom: 0;
            border-left: 5px solid #1DB954; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 5px 15px rgba(0,0,0,0.3);
        }

        .vinyl-record {
            width: 70px; height: 70px; border-radius: 50%;
            background-color: #000; box-shadow: 0 5px 10px rgba(0,0,0,0.8), inset 0 0 0 4px #111;
            position: relative; display: flex; justify-content: center; align-items: center;
            animation: spin 6s linear infinite; /* Animación de giro */
        }

        /* Etiqueta central y hoyo del vinilo */
        .vinyl-record::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background-color: #1a1a2e; border-radius: 50%; z-index: 10;
        }

        .vinyl-cover {
            width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
            border: 2px solid #333; z-index: 5;
        }

        /* Animación para que el disco gire */
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
    </head>
    <body>
        <h1>🎵 Back To The Sample</h1>
        <p class="subtitle">Descubre el árbol genealógico lógico de tus
            canciones favoritas</p>

        <div class="search-box">
            <input type="text" id="songInput" placeholder="Ej: Stan">
            <button onclick="buscarArbol()">Rastrear Samples</button>
        </div>

        <div class="tree-container" id="results">
            <p style="color: #666; text-align: center; font-style: italic;">Los
                resultados aparecerán aquí...</p>
        </div>

        <script>
        async function buscarArbol() {
            const songName = document.getElementById('songInput').value;
            const resultsDiv = document.getElementById('results');
            
            if (!songName) return alert("Escribe el nombre de una canción");

            resultsDiv.innerHTML = '<p style="text-align: center; color: #1DB954;">💿 Conectando con Spotify API y Prolog...</p>';

            try {
                const response = await fetch(`http://localhost:3000/api/arbol/${encodeURIComponent(songName)}`);
                const data = await response.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<p style="color: #ff4d4d; text-align: center; font-weight: bold;">❌ ${data.error}</p>`;
                    return;
                }

                // Dibujar la rola original (CD Cuadrado)
                let html = `
                    <div class="spotify-card">
                        <img src="${data.spotify.portada}" alt="Portada" class="spotify-img">
                        <div>
                            <h3 class="spotify-title">${data.spotify.nombre_oficial}</h3>
                            <p class="spotify-artist">Artista: ${data.spotify.artista}</p>
                        </div>
                    </div>
                `;

                if (data.ancestry_tree.length === 0) {
                    html += `<p style="color: #888; text-align: center; margin-top: 20px;">No se encontró historial de samples en la base de conocimientos para esta canción.</p>`;
                    resultsDiv.innerHTML = html;
                    return;
                }

                // Dibujar los ancestros como Vinilos girando
                data.ancestry_tree.forEach(ancestro => {
                    html += `
                        <div class="arrow">⬇</div>
                        <div class="vinyl-node">
                            <div class="vinyl-record">
                                <img src="${ancestro.portada}" alt="Sello Vinilo" class="vinyl-cover">
                            </div>
                            <div>
                                <h4 style="margin: 0; color: #fff; font-size: 19px; letter-spacing: 0.5px;">${ancestro.titulo}</h4>
                                <p style="margin: 4px 0 0 0; color: #888; font-size: 14px;">Artista: <span style="color: #ccc;">${ancestro.artista}</span></p>
                            </div>
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;

            } catch (error) {
                console.error("Error:", error);
                resultsDiv.innerHTML = '<p style="color: #ff4d4d; text-align: center; font-weight: bold;">Error al conectar con el servidor.</p>';
            }
        }
    </script>
    </body>
</html>
